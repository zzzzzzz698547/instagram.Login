<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客戶資料表單</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen">
    <section class="phone">
      <div class="locale">中文(台灣)</div>

      <div class="brand" aria-hidden="true">
        <div class="brand-mark"></div>
      </div>

      <div class="intro">
        <p class="eyebrow">客戶資料收集</p>
        <h1>把聯絡資訊送進後台</h1>
        <p class="lede">
          以手機版登入頁的節奏呈現，但內容是安全的客戶資料表單。
        </p>
      </div>

      <form class="card" id="client-form">
        <label class="field">
          <span>姓名</span>
          <input name="name" type="text" placeholder="王小明" autocomplete="name" required />
        </label>

        <label class="field">
          <span>電話</span>
          <input name="phone" type="tel" placeholder="0912 345 678" autocomplete="tel" required />
        </label>

        <label class="field">
          <span>Email</span>
          <input name="email" type="email" placeholder="name@example.com" autocomplete="email" required />
        </label>

        <label class="field">
          <span>備註</span>
          <textarea name="note" placeholder="例如：週五再聯繫、想了解方案 A"></textarea>
        </label>

        <button class="primary-btn" type="submit">送出資料</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <div class="divider">
        <span></span>
        <p>或</p>
        <span></span>
      </div>

      <button class="secondary-btn" type="button">查看後台</button>

      <a class="backlink" href="/admin">管理員登入</a>
    </section>
  </main>

  <script>
    const form = document.getElementById('client-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const payload = {
        name: String(data.get('name') || '').trim(),
        phone: String(data.get('phone') || '').trim(),
        email: String(data.get('email') || '').trim(),
        note: String(data.get('note') || '').trim(),
        source: '網站表單'
      };

      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        status.textContent = '資料已送出，後台會同步更新。';
        form.reset();
      } else {
        status.textContent = '送出失敗，請稍後再試。';
      }
    });
  </script>
</body>
</html>
