<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客戶資料表單</title>
  <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <p class="eyebrow">客戶資料收集</p>
      <h1>把聯絡資訊整理進後台</h1>
      <p class="lede">
        這是一個安全的動態表單。客戶送出後，後台會顯示姓名、電話、Email、備註與來源。
      </p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <h2>新增客戶</h2>
        <p>手機與桌面都可直接填寫。</p>
      </div>

      <form class="form" id="client-form">
        <label>
          <span>姓名</span>
          <input name="name" type="text" placeholder="王小明" autocomplete="name" required />
        </label>

        <label>
          <span>電話</span>
          <input name="phone" type="tel" placeholder="0912 345 678" autocomplete="tel" required />
        </label>

        <label>
          <span>Email</span>
          <input name="email" type="email" placeholder="name@example.com" autocomplete="email" required />
        </label>

        <label>
          <span>備註</span>
          <textarea name="note" placeholder="例如：週五再聯繫、想了解方案 A"></textarea>
        </label>

        <button type="submit">送出資料</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById('client-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const payload = {
        name: String(data.get('name') || '').trim(),
        phone: String(data.get('phone') || '').trim(),
        email: String(data.get('email') || '').trim(),
        note: String(data.get('note') || '').trim(),
        source: '網站表單'
      };

      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        status.textContent = '資料已送出，後台會同步更新。';
        form.reset();
      } else {
        status.textContent = '送出失敗，請稍後再試。';
      }
    });
  </script>
</body>
</html>
