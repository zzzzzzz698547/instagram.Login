<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>客戶資料表單</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="screen">
    <section class="phone">
      <div class="locale">中文(台灣)</div>

      <div class="brand" aria-hidden="true">
        <div class="brand-mark">
          <span class="brand-letter">C</span>
        </div>
      </div>

      <form class="card" id="client-form">
        <label class="field">
          <span>帳號</span>
          <input name="account" type="text" placeholder="輸入帳號" autocomplete="username" required />
        </label>

        <label class="field">
          <span>備註</span>
          <input name="note" type="text" placeholder="例如：週五再聯繫、想了解方案 A" autocomplete="off" />
        </label>

        <button class="primary-btn" type="submit">送出資料</button>
        <p class="status" id="status" aria-live="polite"></p>
      </form>

      <div class="divider">
        <span></span>
        <p>或</p>
        <span></span>
      </div>

      <button class="secondary-btn" type="button">查看後台</button>

      <a class="backlink" href="/admin">管理員登入</a>
    </section>
  </main>

  <script>
    const form = document.getElementById('client-form');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const payload = {
        account: String(data.get('account') || '').trim(),
        note: String(data.get('note') || '').trim(),
        source: '網站表單'
      };

      const response = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (response.ok) {
        status.textContent = '資料已送出，後台會同步更新。';
        form.reset();
      } else {
        status.textContent = '送出失敗，請稍後再試。';
      }
    });
  </script>
</body>
</html>
