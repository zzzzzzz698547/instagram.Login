<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手機驗證</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #1b74e4;
      --soft: #f3f4f6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    .screen {
      min-height: 100svh;
      padding: 18px;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      margin: 0 auto;
      padding-top: 2px;
    }

    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .back {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: var(--text);
      font-size: 30px;
      line-height: 1;
      margin-left: -8px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.12;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .lede {
      margin: 10px 0 24px;
      font-size: 16px;
      line-height: 1.55;
      color: var(--text);
    }

    .field {
      width: 100%;
      height: 58px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 0 18px;
      font-size: 16px;
      outline: none;
      background: #fff;
      color: var(--text);
    }

    .field::placeholder { color: #8f8f8f; }

    .helper {
      margin: 14px 0 18px;
      font-size: 13px;
      line-height: 1.5;
      color: var(--muted);
    }

    .helper a {
      color: var(--accent);
      font-weight: 700;
    }

    .primary,
    .secondary {
      width: 100%;
      height: 54px;
      border-radius: 999px;
      border: 0;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: #fff;
    }

    .secondary {
      margin-top: 12px;
      background: var(--soft);
      color: #1f2937;
    }

    .footer {
      margin-top: 112px;
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="screen">
    <section class="phone">
      <div class="topbar">
        <a class="back" href="/index.html" aria-label="返回">‹</a>
      </div>

      <h1>你的聯絡電話是什麼？</h1>
      <p class="lede">輸入可聯絡到你的電話號碼。這只是安全示範頁，不會連動任何真實驗證服務。</p>

      <input class="field" type="tel" inputmode="tel" placeholder="手機號碼" />

      <p class="helper">你可能會收到我們發送的通知簡訊。<a href="/help.html">瞭解詳情</a></p>

      <button class="primary" type="button">下一步</button>
      <button class="secondary" type="button">使用電子郵件地址註冊</button>

      <div class="footer">
        <a href="/index.html">我已經有帳號</a>
      </div>
    </section>
  </main>
</body>
</html>
